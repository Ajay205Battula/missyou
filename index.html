<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You ❤️</title>

<style>

body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ffe6f0,#ffd6e7);
    margin:0;
    padding:0;
}

.container{
    background:white;
    width:90%;
    max-width:400px;
    margin:auto;
    margin-top:15vh;
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

h2{
    font-size:22px;
}

input{
    width:80%;
    padding:12px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    background:#ff4d88;
    color:white;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

button:active{
    transform:scale(0.96);
}

#result{
    font-size:26px;
    margin-top:25px;
    color:#ff3366;
    font-weight:bold;
}

img{
    margin-top:20px;
    width:70%;
    max-width:200px;
}

</style>

</head>

<body>

<div class="container">

<h2>What time did you wake up? ☀️</h2>

<input type="time" id="wakeTime">

<br>

<button onclick="calculate()">Submit</button>

<div id="result"></div>

<img id="cutePic" style="display:none"
src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

</div>

<script>

function calculate(){

let wake = document.getElementById("wakeTime").value;

if(!wake){
alert("Please select time 😊");
return;
}

let now = new Date();

let wakeParts = wake.split(":");

let wakeDate = new Date();
wakeDate.setHours(wakeParts[0]);
wakeDate.setMinutes(wakeParts[1]);
wakeDate.setSeconds(0);

let diff = now - wakeDate;

let hours = Math.floor(diff / (1000*60*60));
let minutes = Math.floor((diff % (1000*60*60)) / (1000*60));

document.getElementById("result").innerHTML =
`Since ${hours} hours ${minutes} minutes I am missing you 🥺❤️`;

document.getElementById("cutePic").style.display="block";

}

</script>

</body>
</html>
